<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Digital</title>
</head>
<body>
    <link rel="stylesheet" href="css/style.css">
 
    <header>
        <h1>Contador Digital</h1>
        <nav>
            <button id="btn_lancamentos">Lançamentos</button>
            <button id="btn_relatorios">Relatórios</button>
            <button id="btn_limitesDeGastos">Limites de Gastos</button>
            <button id="btn_Calculadoras">Calculadoras</button>
        </nav>
    </header>

    <div class="main">
        <div class="container">
        <h2>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
            </svg>
            Renda
        </h2>
        <p id="renda"></p>
        </div>

        <div class="container">
            <h2>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
                </svg>
            Gastos
            </h2>
            <p id="gastos"></p>
        </div>

        <div class="container">
            <h2>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                Saldo
            </h2>
            <p id="saldo"></p>
        </div>
    </div>
    <script src="json/main.js"></script>

</html>
